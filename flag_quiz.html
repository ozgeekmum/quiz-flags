<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>World Flag Quiz</title>
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:system-ui,sans-serif;background:#f5f5f0;color:#1a1a1a;min-height:100vh}
#app{max-width:680px;margin:0 auto;padding:1rem}
h1{font-size:22px;font-weight:500;margin-bottom:1.25rem}
.filter-bar{display:flex;gap:6px;margin-bottom:.75rem;flex-wrap:wrap;align-items:center}
.filter-label{font-size:12px;color:#888;width:100%}
.filter-btn{padding:5px 11px;border:1px solid #ccc;border-radius:20px;background:#fff;color:#555;cursor:pointer;font-size:12px}
.filter-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.mode-bar{display:flex;gap:6px;margin-top:.75rem;margin-bottom:1.25rem}
.mode-btn{padding:7px 20px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#555;cursor:pointer;font-size:13px}
.mode-btn.active{background:#1a1a1a;color:#fff;border-color:#1a1a1a;font-weight:500}
.card{background:#fff;border:1px solid #e0e0d8;border-radius:12px;padding:1.25rem 1.5rem;margin-bottom:1rem}
.stats{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:1rem}
.stat{background:#f0efe8;border-radius:8px;padding:.75rem;text-align:center}
.stat-n{font-size:22px;font-weight:500}
.stat-l{font-size:11px;color:#888;margin-top:2px}
.flag-wrap{display:flex;align-items:center;justify-content:center;background:#fff;border:1px solid #e8e8e0;border-radius:12px;padding:1.5rem;margin-bottom:1.25rem;min-height:160px;box-shadow:inset 0 1px 4px rgba(0,0,0,.04)}
.flag-wrap img{max-width:300px;max-height:180px;width:100%;object-fit:contain;border-radius:3px;box-shadow:0 1px 6px rgba(0,0,0,.15)}
.options{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.opt{padding:11px 8px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;text-align:center;font-size:14px;font-weight:500;font-family:system-ui,sans-serif;line-height:1.3}
.opt:hover:not(:disabled){background:#f5f5f0}
.opt.correct{background:#eaf3de;border-color:#639922;color:#27500a}
.opt.wrong{background:#fcebeb;border-color:#a32d2d;color:#791f1f}
.opt:disabled{cursor:default}
.feedback{font-size:13px;margin-top:.75rem;padding:.5rem .75rem;border-radius:8px}
.feedback.correct{background:#eaf3de;color:#3b6d11}
.feedback.wrong{background:#fcebeb;color:#a32d2d}
.next-btn{margin-top:1rem;padding:8px 22px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:14px;font-family:system-ui,sans-serif}
.next-btn:hover{background:#f0efe8}
.score-card{text-align:center;padding:2rem}
.score-big{font-size:52px;font-weight:500}
.score-label{font-size:14px;color:#888;margin-top:.25rem}
.score-msg{font-size:15px;color:#555;margin-top:1rem}
.restart-btn{margin-top:1.5rem;padding:10px 28px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;cursor:pointer;font-size:14px;font-family:system-ui,sans-serif}
.restart-btn:hover{background:#f0efe8}
.diff-badge{display:inline-block;font-size:10px;padding:2px 8px;border-radius:20px;margin-bottom:.5rem}
.easy{background:#eaf3de;color:#3b6d11}
.medium{background:#fef3cd;color:#7a5a00}
.hard{background:#fcebeb;color:#a32d2d}
.study-search{width:100%;padding:9px 12px;border:1px solid #ccc;border-radius:8px;background:#fff;color:#1a1a1a;font-size:14px;font-family:system-ui,sans-serif;margin-bottom:1rem}
.study-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:12px}
.study-card{background:#fff;border:1px solid #e0e0d8;border-radius:10px;padding:.75rem;text-align:center}
.study-card img{width:100%;max-height:70px;object-fit:contain;border-radius:3px;box-shadow:0 1px 4px rgba(0,0,0,.12);margin-bottom:.5rem;display:block}
.study-card .country-name{font-size:13px;font-weight:500;color:#1a1a1a;margin-bottom:2px}
.study-card .country-cont{font-size:11px;color:#888;margin-bottom:4px}
</style>
</head>
<body>
<div id="app">
  <h1>🌍 World Flag Quiz</h1>
  <div class="filter-bar">
    <span class="filter-label">Filter by continent or difficulty:</span>
    <button class="filter-btn active" id="f-all"      onclick="setFilter('all')">All</button>
    <button class="filter-btn"        id="f-Europe"   onclick="setFilter('Europe')">Europe</button>
    <button class="filter-btn"        id="f-Americas" onclick="setFilter('Americas')">Americas</button>
    <button class="filter-btn"        id="f-Africa"   onclick="setFilter('Africa')">Africa</button>
    <button class="filter-btn"        id="f-Asia"     onclick="setFilter('Asia')">Asia</button>
    <button class="filter-btn"        id="f-Oceania"  onclick="setFilter('Oceania')">Oceania</button>
    <button class="filter-btn"        id="f-easy"     onclick="setFilter('easy')">⭐ Easy</button>
    <button class="filter-btn"        id="f-medium"   onclick="setFilter('medium')">⭐⭐ Medium</button>
    <button class="filter-btn"        id="f-hard"     onclick="setFilter('hard')">⭐⭐⭐ Hard</button>
  </div>
  <div class="mode-bar">
    <button class="mode-btn active" onclick="setMode('quiz')"  id="m-quiz">Quiz me</button>
    <button class="mode-btn"        onclick="setMode('study')" id="m-study">Study flags</button>
  </div>
  <div id="main"></div>
</div>

const CONTINENTS = ['Europe','Americas','Africa','Asia','Oceania'];
const DIFFS = ['easy','medium','hard'];
let filter='all', mode='quiz', deck=[], idx=0, score=0, answered=false;

function filtered(){
  const base = ALL.filter(c=>c[3]);
  if(filter==='all') return base;
  if(CONTINENTS.includes(filter)) return base.filter(c=>c[1]===filter);
  if(DIFFS.includes(filter)) return base.filter(c=>c[2]===filter);
  return base;
}
function shuffle(a){return[...a].sort(()=>Math.random()-.5)}
function setFilter(f){
  filter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  document.getElementById('f-'+f).classList.add('active');
  mode==='quiz'?startQuiz():renderStudy();
}
function setMode(m){
  mode=m;
  document.getElementById('m-quiz').classList.toggle('active',m==='quiz');
  document.getElementById('m-study').classList.toggle('active',m==='study');
  m==='quiz'?startQuiz():renderStudy();
}
function startQuiz(){
  deck=shuffle(filtered());idx=0;score=0;answered=false;renderQuiz();
}
function renderQuiz(){
  const main=document.getElementById('main');
  if(!deck.length){
    main.innerHTML='<div class="card" style="text-align:center;padding:2rem;color:#888">No flags in this filter.</div>';
    return;
  }
  if(idx>=deck.length){
    const pct=Math.round(score/deck.length*100);
    const msg=pct>=90?'🏆 Vexillology master!':pct>=70?'👍 Great knowledge!':pct>=50?'🌍 Getting there!':'💪 Keep studying!';
    main.innerHTML=`<div class="card score-card"><div class="score-big">${score}/${deck.length}</div><div class="score-label">${pct}% correct</div><div class="score-msg">${msg}</div><button class="restart-btn" onclick="startQuiz()">Try again</button></div>`;
    return;
  }
  const item=deck[idx];
  const wrongs=shuffle(ALL.filter(c=>c[0]!==item[0]&&c[3])).slice(0,3);
  const opts=shuffle([item,...wrongs]);
  answered=false;
  main.innerHTML=`
    <div class="stats">
      <div class="stat"><div class="stat-n">${idx+1}/${deck.length}</div><div class="stat-l">question</div></div>
      <div class="stat"><div class="stat-n">${score}</div><div class="stat-l">correct</div></div>
      <div class="stat"><div class="stat-n">${idx>0?Math.round(score/idx*100):'-'}%</div><div class="stat-l">accuracy</div></div>
    </div>
    <div class="card" style="text-align:center">
      <span class="diff-badge ${item[2]}">${item[2]}</span>
      <p style="font-size:13px;color:#888;margin-bottom:1rem">Which country does this flag belong to?</p>
      <div class="flag-wrap"><img src="${item[3]}" alt="flag"></div>
      <div class="options">
        ${opts.map((o,i)=>`<button class="opt" data-name="${o[0].replace(/"/g,'&quot;')}" onclick="choose(${i})">${o[0]}</button>`).join('')}
      </div>
      <div id="feedback"></div>
    </div>`;
}
function choose(i){
  if(answered)return;answered=true;
  const item=deck[idx];
  const btns=document.querySelectorAll('.opt');
  const isCorrect=btns[i].dataset.name===item[0];
  if(isCorrect)score++;
  btns.forEach(b=>{
    b.disabled=true;
    if(b.dataset.name===item[0])b.classList.add('correct');
    else if(b===btns[i]&&!isCorrect)b.classList.add('wrong');
  });
  document.getElementById('feedback').innerHTML=isCorrect
    ?`<div class="feedback correct">✓ Correct! ${item[0]} — ${item[1]}</div><button class="next-btn" onclick="nextQ()">Next →</button>`
    :`<div class="feedback wrong">✗ That's ${item[0]} (${item[1]})</div><button class="next-btn" onclick="nextQ()">Next →</button>`;
}
function nextQ(){idx++;renderQuiz();}
function renderStudy(){
  const src=filtered();
  document.getElementById('main').innerHTML=`
    <input class="study-search" id="srch" placeholder="Search by country or continent..." oninput="filterStudy()">
    <div class="study-grid" id="study-grid">
      ${src.map(c=>`<div class="study-card" data-name="${c[0].toLowerCase()}" data-cont="${c[1].toLowerCase()}">
        ${c[3]?`<img src="${c[3]}" alt="${c[0]}">`:''}
        <div class="country-name">${c[0]}</div>
        <div class="country-cont">${c[1]}</div>
        <span class="diff-badge ${c[2]}">${c[2]}</span>
      </div>`).join('')}
    </div>`;
}
function filterStudy(){
  const q=document.getElementById('srch').value.toLowerCase();
  document.querySelectorAll('.study-card').forEach(el=>{
    el.style.display=(el.dataset.name.includes(q)||el.dataset.cont.includes(q))?'':'none';
  });
}
startQuiz();
</script>
